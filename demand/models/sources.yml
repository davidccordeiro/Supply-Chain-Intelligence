# demand/models/sources.yml

version: 2

sources:
  - name: raw
    schema: raw
    description: >
      Raw data landed from source systems. The demand domain
      owns pos_sales. All other raw tables are owned by the
      supply domain — reference them via supply's public models,
      not directly from raw.

    freshness:
      warn_after:  {count: 24, period: hour}
      error_after: {count: 48, period: hour}

    tables:

      # ── POS Sales ─────────────────────────────────────────────────────────

      # This is the demand domain's primary source table.
      # Grain: one row per individual sale transaction.
      
      - name: pos_sales
        description: >
          Point of sale transactions from all active stores.
          Source system: POS platform, synced hourly via Airbyte.
          Grain: one row per sale event (store + product + timestamp).
        loaded_at_field: sale_date
        columns:
          - name: sale_id
            description: >
              Primary key. Generated by POS system.
              Note: not guaranteed unique in source — deduplication
              happens in stg_sales.
            tests:
              - not_null
          - name: store_id
            description: Foreign key to raw.stores (owned by supply domain).
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'stores')
                  field: store_id
          - name: product_id
            description: Foreign key to raw.products (owned by supply domain).
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'products')
                  field: product_id
          - name: sale_date
            description: >
              Date of transaction. Used as freshness check field.
              Truncated to date (no time component) in stg_sales.
            tests:
              - not_null
          - name: quantity
            description: Units sold. Always positive — returns are separate transactions.
            tests:
              - not_null
          - name: unit_price
            description: >
              Price per unit at time of sale. Captured from POS,
              not from product catalogue. Use this for revenue calculations.
            tests:
              - not_null
          - name: total_amount
            description: >
              quantity x unit_price. Pre-calculated by POS system.
              Validate against quantity * unit_price in stg_sales
              to catch rounding errors.
            tests:
              - not_null